# Nixpacks (Railway): Node 22, OpenSSL para Prisma, limpieza antes de npm ci.
# dependsOn evita que install/build corran sin el setup de Node.

[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
nixLibs = ["...", "openssl"]

[phases.install]
dependsOn = ["setup"]
cmds = ["node scripts/railway-prebuild.mjs", "npm ci"]

[phases.build]
dependsOn = ["install"]
cmds = ["npm run railway:build"]

[start]
cmd = "npm run start:api"
