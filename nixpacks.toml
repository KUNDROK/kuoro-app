# Nixpacks (Railway u otros): Node 22 + limpieza antes de npm ci evita EBUSY en apps/web/node_modules/.vite
# Si el proyecto usa Railpack en lugar de Nixpacks, replica en el panel:
#   Install: npm run railway:preinstall && npm ci   (o el install por defecto + variable CI)
#   Build: npm run railway:build

providers = ["node"]

[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.install]
cmds = ["npm run railway:preinstall", "npm ci"]

[phases.build]
cmds = ["npm run railway:build"]
